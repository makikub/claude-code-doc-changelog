name: Track Documentation Changes

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 09:00 UTC
  workflow_dispatch:       # Manual trigger
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'scripts/site_generator.py'
      - 'scripts/config.py'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and compare documentation
        if: github.event_name != 'push'
        run: python -m scripts.fetch
        env:
          PYTHONUNBUFFERED: '1'

      - name: Check for changes
        if: github.event_name != 'push'
        id: check
        run: |
          git add snapshots/ changelog/
          if git diff --cached --quiet; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: github.event_name != 'push' && steps.check.outputs.changes == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "docs: update snapshots $(date -u +%Y-%m-%d)"
          git push

      - name: Generate site (design changes only)
        if: github.event_name == 'push'
        run: python -m scripts.site_generator

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
