<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Claude Code Docs Changelog{% endblock %}</title>
  <meta name="description" content="Daily changelog tracking changes to the Claude Code documentation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Figtree:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3.4.48/bundles/css/diff2html.min.css">
  <link rel="stylesheet" href="{{ root_prefix }}assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-top">
        <a href="{{ root_prefix }}index.html" class="logo">
          <span class="logo-mark">&Delta;</span>
          <span class="logo-text">Docs Changelog</span>
        </a>
        <nav class="header-nav">
          <a href="{{ root_prefix }}index.html" class="{% block nav_timeline %}{% endblock %}">Timeline</a>
          <a href="{{ root_prefix }}pages/index.html" class="{% block nav_pages %}{% endblock %}">Pages</a>
          <a href="https://github.com/masakikubota/claude-code-doc-log" class="nav-external">GitHub</a>
        </nav>
      </div>
      <p class="site-tagline">Tracking daily changes to <a href="https://code.claude.com/docs/en/overview">Claude Code documentation</a></p>
    </div>
  </header>

  <div class="container">
    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>Updated daily via GitHub Actions. Source: <a href="https://code.claude.com/docs/en/overview">code.claude.com</a></p>
    </footer>
  </div>

  <button id="back-to-top" aria-label="Back to top" title="Back to top">&#8593;</button>

  <script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.48/bundles/js/diff2html-ui.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('[data-diff]').forEach(function(el) {
        var diffString = el.textContent;
        el.textContent = '';
        var configuration = {
          drawFileList: false,
          matching: 'words',
          outputFormat: 'line-by-line',
          highlight: false,
        };
        var diff2htmlUi = new Diff2HtmlUI(el, diffString, configuration);
        diff2htmlUi.draw();
      });

      /* Prevent summary toggle when clicking links inside summary */
      document.querySelectorAll('summary a').forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.stopPropagation();
        });
      });

      /* Back to Top button */
      var backToTop = document.getElementById('back-to-top');
      if (backToTop) {
        var scrollTicking = false;
        window.addEventListener('scroll', function() {
          if (!scrollTicking) {
            requestAnimationFrame(function() {
              backToTop.classList.toggle('visible', window.scrollY > 300);
              scrollTicking = false;
            });
            scrollTicking = true;
          }
        });
        backToTop.addEventListener('click', function() {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }

      /* Mobile: detect horizontal overflow and show scroll shadow */
      if (window.innerWidth <= 768) {
        var SCROLL_TOLERANCE = 2;

        var checkOverflows = function(root) {
          root.querySelectorAll('.d2h-code-wrapper').forEach(function(w) {
            var fw = w.closest('.d2h-file-wrapper');
            if (!fw) return;
            var over = w.scrollWidth > w.clientWidth;
            var atEnd = w.scrollLeft + w.clientWidth >= w.scrollWidth - SCROLL_TOLERANCE;
            fw.classList.toggle('has-overflow', over && !atEnd);
          });
        };
        checkOverflows(document);

        document.querySelectorAll('details').forEach(function(d) {
          d.addEventListener('toggle', function() {
            if (d.open) setTimeout(function() { checkOverflows(d); }, 50);
          });
        });

        document.querySelectorAll('.d2h-code-wrapper').forEach(function(w) {
          var ticking = false;
          w.addEventListener('scroll', function() {
            if (!ticking) {
              requestAnimationFrame(function() {
                var fw = w.closest('.d2h-file-wrapper');
                if (fw) checkOverflows(fw);
                ticking = false;
              });
              ticking = true;
            }
          });
        });
      }
    });
  </script>
</body>
</html>
